name: Auto Publish Releases (Mac & Win)

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build na plataforma ${{ matrix.artifact_name }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            electron_target: '--win'
            artifact_name: win-x64
          - os: macos-latest
            # macos-latest runs on Apple Silicon (M1/M2/M3) - ARM64
            electron_target: '--mac --arm64'
            artifact_name: mac-arm64
          - os: macos-13
            # macos-13 runs on Intel Processors - x64
            electron_target: '--mac --x64'
            artifact_name: mac-x64

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Obter Código Central
        uses: actions/checkout@v4
      
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Instalar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Forjar Backend Python (PyInstaller nativo)
        run: |
          cd execution
          python -m venv venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          pip install -r ../requirements.txt
          pip install pyinstaller
          pyinstaller --name api --onefile --hidden-import="websockets" --hidden-import="fastapi" --hidden-import="uvicorn" api.py
        shell: bash

      - name: Acoplar API no Sistema Base do Electron
        run: |
          mkdir -p web_app/bin
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp execution/dist/api.exe web_app/bin/api.exe
          else
            cp execution/dist/api web_app/bin/api
            chmod +x web_app/bin/api
          fi
        shell: bash

      - name: Construir Lógica UI (Vite)
        working-directory: web_app
        run: |
          npm ci || npm install
          npm run build

      - name: Caixa Final Electron-Builder
        working-directory: web_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.electron_target }} --publish never

      - name: Extrair Pacote Concluído
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.artifact_name }}
          path: |
            web_app/release/*.exe
            web_app/release/*.dmg
          retention-days: 1

  publish:
    name: Compilar Artifacts e Lançar versão Alpha
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Resultados do GitHub
        uses: actions/download-artifact@v4
        with:
          path: distribuicoes/
          merge-multiple: true
      
      - name: Fix Filenames (Identificar Arq)
        run: |
          cd distribuicoes
          for f in *.dmg; do mv "$f" "${f%.dmg}-mac-arm64.dmg" 2>/dev/null || true; done
          # Just an extra step if we want to organize files. Actually they will just be uploaded.

      - name: Lançar Publicação Oficial (Release)
        uses: softprops/action-gh-release@v2
        with:
          name: "Lançamento Oficial (Push para Master)"
          generate_release_notes: true
          tag_name: "v1.0.${{ github.run_number }}"
          files: distribuicoes/**/* 
          fail_on_unmatched_files: false
          draft: false
