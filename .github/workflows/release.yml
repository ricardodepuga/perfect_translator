name: Auto Publish Releases (Mac & Win)

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.artifact_name }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            electron_target: '--win'
            artifact_name: win-x64
            python_arch: 'x64'
          - os: macos-latest
            # macos-latest runs on Apple Silicon (M1/M2/M3) - ARM64
            electron_target: '--mac --arm64'
            artifact_name: mac-arm64
            python_arch: 'arm64'
          - os: macos-latest
            # Force x64 Python environment so Rosetta 2 builds an Intel binary natively
            electron_target: '--mac --x64'
            artifact_name: mac-x64
            python_arch: 'x64'

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}

      - name: Build Python Backend (Native PyInstaller)
        run: |
          python -m venv venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --name api --onefile --hidden-import="websockets" --hidden-import="fastapi" --hidden-import="uvicorn" --hidden-import="pydub" execution/api.py
        shell: bash

      - name: Bundle API into Electron base system
        run: |
          mkdir -p web_app/bin
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp dist/api.exe web_app/bin/api.exe
          else
            cp dist/api web_app/bin/api
            chmod +x web_app/bin/api
          fi
        shell: bash

      - name: Build UI Logic (Vite)
        working-directory: web_app
        run: |
          npm ci || npm install
          npm run lint
          npm run build

      - name: Finalize Electron-Builder packaging
        working-directory: web_app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.electron_target }} --publish never

      - name: Upload Completed Package
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.artifact_name }}
          path: |
            web_app/release/*.exe
            web_app/release/*.dmg
          retention-days: 1

  publish:
    name: Compile Artifacts and Launch Alpha version
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Results from GitHub
        uses: actions/download-artifact@v4
        with:
          path: distribuicoes/
          merge-multiple: true
      
      - name: Extract Commit Message for Release Notes
        id: release_notes
        run: |
          echo "### 🚀 What's New" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          git log -1 --pretty=format:"%s" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "Commit details:" >> RELEASE_NOTES.md
          git log -1 --pretty=format:"%b" >> RELEASE_NOTES.md

      - name: Create Official Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Perfect Translator v1.0.${{ github.run_number }}"
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          tag_name: "v1.0.${{ github.run_number }}"
          files: distribuicoes/**/* 
          fail_on_unmatched_files: false
          draft: false
